<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SUBX — Administration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #1A1A1A;
      --card: #2A2A2A;
      --card-hover: #313131;
      --border: #3A3A3A;
      --green: #7CB928;
      --green-dark: #6aa320;
      --red: #E53935;
      --red-dark: #c62828;
      --orange: #FF8C00;
      --text: #F0F0F0;
      --muted: #999;
      --topbar-h: 64px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
    }

    /* ── Auth overlay ── */
    #auth-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      flex-direction: column;
      gap: 16px;
    }
    #auth-overlay.hidden { display: none; }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Topbar ── */
    #topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--topbar-h);
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
    }

    #topbar .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    #topbar .logo-wrap img {
      height: 36px;
      width: auto;
    }
    #topbar .logo-wordmark {
      font-family: 'Oswald', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--green);
      letter-spacing: 1px;
    }

    #topbar .divider {
      width: 1px;
      height: 28px;
      background: var(--border);
    }

    #topbar .title {
      font-family: 'Oswald', sans-serif;
      font-size: 18px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    #topbar .spacer { flex: 1; }

    #topbar .admin-badge {
      background: rgba(124,185,40,0.15);
      border: 1px solid rgba(124,185,40,0.3);
      color: var(--green);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    #btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 16px;
      border-radius: 8px;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    #btn-logout:hover {
      border-color: var(--red);
      color: var(--red);
    }

    /* ── Main layout ── */
    #main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .stat-card .stat-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
    }
    .stat-card .stat-value {
      font-family: 'Oswald', sans-serif;
      font-size: 36px;
      font-weight: 700;
      line-height: 1;
    }
    .stat-card.pending .stat-value { color: var(--orange); }
    .stat-card.approved .stat-value { color: var(--green); }
    .stat-card.rejected .stat-value { color: var(--red); }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
      width: fit-content;
    }

    .tab-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 20px;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .tab-btn .tab-count {
      background: var(--border);
      color: var(--muted);
      font-size: 11px;
      min-width: 20px;
      height: 20px;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 6px;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--green);
      color: #fff;
    }
    .tab-btn.active .tab-count {
      background: rgba(255,255,255,0.25);
      color: #fff;
    }

    /* ── Loading / empty ── */
    .loading-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 0;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 0;
      gap: 12px;
      color: var(--muted);
    }
    .empty-state .empty-icon {
      font-size: 48px;
      opacity: 0.4;
    }
    .empty-state .empty-title {
      font-family: 'Oswald', sans-serif;
      font-size: 20px;
      font-weight: 500;
    }
    .empty-state .empty-sub {
      font-size: 13px;
    }

    /* ── Application cards ── */
    .cards-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .app-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .app-card:hover { border-color: #4a4a4a; }

    .app-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px 14px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-wrap: wrap;
    }

    .app-card-title {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .org-name {
      font-family: 'Oswald', sans-serif;
      font-size: 20px;
      font-weight: 600;
    }

    .org-type-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(255,255,255,0.07);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .status-badge {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 4px 12px;
      border-radius: 20px;
    }
    .status-badge.pending { background: rgba(255,140,0,0.15); color: var(--orange); border: 1px solid rgba(255,140,0,0.3); }
    .status-badge.approved { background: rgba(124,185,40,0.15); color: var(--green); border: 1px solid rgba(124,185,40,0.3); }
    .status-badge.rejected { background: rgba(229,57,53,0.15); color: var(--red); border: 1px solid rgba(229,57,53,0.3); }

    .app-date {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .app-card-body {
      padding: 18px 22px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px 20px;
    }

    .info-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .info-item .info-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
    }
    .info-item .info-value {
      font-size: 14px;
      color: var(--text);
      word-break: break-word;
    }
    .info-item .info-value a {
      color: var(--green);
      text-decoration: none;
    }
    .info-item .info-value a:hover { text-decoration: underline; }
    .info-item.full { grid-column: 1 / -1; }

    .description-text {
      font-size: 14px;
      line-height: 1.6;
      color: #ccc;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      padding: 12px;
      border-left: 3px solid var(--border);
    }

    /* ── Actions ── */
    .app-card-actions {
      padding: 14px 22px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 9px 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-approve {
      background: var(--green);
      color: #fff;
    }
    .btn-approve:hover:not(:disabled) { background: var(--green-dark); }

    .btn-reject {
      background: transparent;
      color: var(--red);
      border: 1px solid var(--red);
    }
    .btn-reject:hover:not(:disabled) {
      background: rgba(229,57,53,0.1);
    }

    .btn-cancel {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-cancel:hover:not(:disabled) { border-color: #666; color: var(--text); }

    .btn-confirm-reject {
      background: var(--red);
      color: #fff;
    }
    .btn-confirm-reject:hover:not(:disabled) { background: var(--red-dark); }

    /* ── Reject inline form ── */
    .reject-form {
      padding: 14px 22px;
      background: rgba(229,57,53,0.06);
      border-top: 1px solid rgba(229,57,53,0.2);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .reject-form label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--red);
    }
    .reject-form textarea {
      background: var(--bg);
      border: 1px solid rgba(229,57,53,0.3);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      padding: 10px 14px;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color 0.2s;
    }
    .reject-form textarea:focus { border-color: var(--red); }
    .reject-form-actions { display: flex; gap: 8px; }

    /* ── Rejection reason display ── */
    .rejection-reason {
      padding: 10px 22px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .rejection-reason .rr-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--red);
    }
    .rejection-reason .rr-text {
      font-size: 13px;
      color: #ccc;
      font-style: italic;
    }

    /* ── Toast ── */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }
    .toast {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      animation: toast-in 0.3s ease;
      pointer-events: auto;
      min-width: 260px;
    }
    .toast.success { border-left: 4px solid var(--green); color: var(--text); }
    .toast.error { border-left: 4px solid var(--red); color: var(--text); }
    @keyframes toast-in {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes toast-out {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(12px); }
    }
    .toast.fade-out { animation: toast-out 0.3s ease forwards; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      #topbar { padding: 0 16px; }
      #topbar .title { display: none; }
      #topbar .divider { display: none; }
      #main { padding: 20px 14px 60px; }
      .stats-row { grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
      .stat-card { padding: 14px 16px; }
      .stat-card .stat-value { font-size: 28px; }
      .tabs { width: 100%; }
      .tab-btn { flex: 1; justify-content: center; padding: 8px 10px; }
      .app-card-body { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 400px) {
      .stats-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Auth overlay -->
<div id="auth-overlay">
  <div class="spinner"></div>
  <p style="color:var(--muted);font-size:13px;">Vérification des droits…</p>
</div>

<!-- Topbar -->
<header id="topbar">
  <a href="index.html" class="logo-wrap">
    <img src="logo_subx.svg" alt="SUBX" onerror="this.style.display='none'" />
    <span class="logo-wordmark">SUBX</span>
  </a>
  <div class="divider"></div>
  <span class="title">Administration</span>
  <div class="spacer"></div>
  <span class="admin-badge">Admin</span>
  <button id="btn-logout">Déconnexion</button>
</header>

<!-- Main -->
<main id="main">

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card pending">
      <span class="stat-label">En attente</span>
      <span class="stat-value" id="count-pending">—</span>
    </div>
    <div class="stat-card approved">
      <span class="stat-label">Approuvés</span>
      <span class="stat-value" id="count-approved">—</span>
    </div>
    <div class="stat-card rejected">
      <span class="stat-label">Rejetés</span>
      <span class="stat-value" id="count-rejected">—</span>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="pending">
      En attente <span class="tab-count" id="tab-count-pending">0</span>
    </button>
    <button class="tab-btn" data-tab="approved">
      Approuvés <span class="tab-count" id="tab-count-approved">0</span>
    </button>
    <button class="tab-btn" data-tab="rejected">
      Rejetés <span class="tab-count" id="tab-count-rejected">0</span>
    </button>
  </div>

  <!-- Cards container -->
  <div id="cards-container"></div>

</main>

<!-- Toast container -->
<div id="toast-container"></div>

<script>
  const SUPABASE_URL = 'https://ipuryomreqlrhhutjnkq.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlwdXJ5b21yZXFscmhodXRqbmtxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NjUxODEsImV4cCI6MjA5MDQ0MTE4MX0.yKO82AzFVYwI8TD2UhtqmrneGAHA32IA2gNDoZo7V8A';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  const authOverlay = document.getElementById('auth-overlay');
  const cardsContainer = document.getElementById('cards-container');

  let currentTab = 'pending';
  let allCounts = { pending: 0, approved: 0, rejected: 0 };
  let currentUser = null;

  // ── Org type config ──────────────────────────────────────────────────────────
  const ORG_TYPES = {
    association: { label: 'Association', icon: '🤝' },
    club:        { label: 'Club sportif', icon: '⚽' },
    entreprise:  { label: 'Entreprise', icon: '🏢' },
    particulier: { label: 'Particulier', icon: '👤' },
  };

  // ── Toast ────────────────────────────────────────────────────────────────────
  function showToast(msg, type = 'success') {
    const tc = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `<span>${type === 'success' ? '✓' : '✕'}</span><span>${msg}</span>`;
    tc.appendChild(t);
    setTimeout(() => {
      t.classList.add('fade-out');
      setTimeout(() => t.remove(), 300);
    }, 3500);
  }

  // ── Auth guard ───────────────────────────────────────────────────────────────
  async function initAuth() {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) {
      window.location.replace('index.html');
      return;
    }
    currentUser = user;

    const { data: profile, error } = await sb.from('profiles')
      .select('role')
      .eq('id', user.id)
      .single();

    if (error || !profile || profile.role !== 'admin') {
      window.location.replace('index.html');
      return;
    }

    authOverlay.classList.add('hidden');
    initPage();
  }

  // ── Page init ────────────────────────────────────────────────────────────────
  async function initPage() {
    await loadCounts();
    await loadApplications();
  }

  async function loadCounts() {
    const statuses = ['pending', 'approved', 'rejected'];
    await Promise.all(statuses.map(async (s) => {
      const { count } = await sb.from('organizers')
        .select('*', { count: 'exact', head: true })
        .eq('status', s);
      allCounts[s] = count || 0;
      document.getElementById(`count-${s}`).textContent = count || 0;
      document.getElementById(`tab-count-${s}`).textContent = count || 0;
    }));
  }

  async function loadApplications() {
    cardsContainer.innerHTML = `<div class="loading-wrap"><div class="spinner"></div></div>`;

    const { data, error } = await sb.from('organizers')
      .select('*, profiles!organizers_user_id_fkey(full_name, avatar_url, account_type, email)')
      .eq('status', currentTab)
      .order('created_at', { ascending: false });

    if (error) {
      cardsContainer.innerHTML = `<div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Erreur de chargement</div>
        <div class="empty-sub">${error.message}</div>
      </div>`;
      return;
    }

    if (!data || data.length === 0) {
      const labels = { pending: 'En attente', approved: 'Approuvés', rejected: 'Rejetés' };
      const icons = { pending: '📋', approved: '✅', rejected: '❌' };
      cardsContainer.innerHTML = `<div class="empty-state">
        <div class="empty-icon">${icons[currentTab]}</div>
        <div class="empty-title">Aucune candidature</div>
        <div class="empty-sub">Il n'y a aucune candidature « ${labels[currentTab]} » pour le moment.</div>
      </div>`;
      return;
    }

    const html = data.map(app => renderCard(app)).join('');
    cardsContainer.innerHTML = `<div class="cards-list">${html}</div>`;

    // Attach event listeners
    data.forEach(app => {
      const uid = app.user_id;

      if (currentTab === 'pending') {
        const btnApprove = document.getElementById(`btn-approve-${uid}`);
        const btnReject = document.getElementById(`btn-reject-${uid}`);
        const rejectForm = document.getElementById(`reject-form-${uid}`);
        const btnCancel = document.getElementById(`btn-cancel-${uid}`);
        const btnConfirm = document.getElementById(`btn-confirm-${uid}`);

        btnApprove.addEventListener('click', () => approveApp(uid, btnApprove, btnReject));
        btnReject.addEventListener('click', () => {
          rejectForm.style.display = 'flex';
          btnApprove.disabled = true;
          btnReject.disabled = true;
        });
        btnCancel.addEventListener('click', () => {
          rejectForm.style.display = 'none';
          btnApprove.disabled = false;
          btnReject.disabled = false;
        });
        btnConfirm.addEventListener('click', () => {
          const reason = document.getElementById(`reject-reason-${uid}`).value.trim();
          rejectApp(uid, reason, btnConfirm);
        });
      }
    });
  }

  function renderCard(app) {
    const uid = app.user_id;
    const profile = app.profiles || {};
    const orgType = ORG_TYPES[app.org_type] || { label: app.org_type || '—', icon: '🏷️' };
    const statusLabel = { pending: 'En attente', approved: 'Approuvé', rejected: 'Rejeté' };
    const createdAt = app.created_at
      ? new Date(app.created_at).toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' })
      : '—';
    const reviewedAt = app.reviewed_at
      ? new Date(app.reviewed_at).toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' })
      : null;

    const websiteHtml = app.website
      ? `<a href="${app.website}" target="_blank" rel="noopener">${app.website.replace(/^https?:\/\//, '')}</a>`
      : '<span style="color:var(--muted)">—</span>';

    const eventsCount = app.events_count != null ? app.events_count : '—';
    const email = profile.email || app.contact_email || '<span style="color:var(--muted)">Non renseigné</span>';

    let actionsHtml = '';
    if (currentTab === 'pending') {
      actionsHtml = `
        <div class="app-card-actions">
          <button class="btn btn-approve" id="btn-approve-${uid}">✓ Approuver</button>
          <button class="btn btn-reject" id="btn-reject-${uid}">✕ Rejeter</button>
        </div>
        <div class="reject-form" id="reject-form-${uid}" style="display:none;">
          <label>Motif de rejet (optionnel)</label>
          <textarea id="reject-reason-${uid}" placeholder="Expliquez pourquoi la candidature est rejetée…"></textarea>
          <div class="reject-form-actions">
            <button class="btn btn-confirm-reject" id="btn-confirm-${uid}">Confirmer le rejet</button>
            <button class="btn btn-cancel" id="btn-cancel-${uid}">Annuler</button>
          </div>
        </div>
      `;
    } else if (currentTab === 'rejected' && app.rejection_reason) {
      actionsHtml = `
        <div class="rejection-reason">
          <span class="rr-label">Motif de rejet</span>
          <span class="rr-text">${escHtml(app.rejection_reason)}</span>
          ${reviewedAt ? `<span style="font-size:11px;color:var(--muted);margin-top:2px">Traité le ${reviewedAt}</span>` : ''}
        </div>
      `;
    } else if (currentTab === 'approved' && reviewedAt) {
      actionsHtml = `
        <div class="rejection-reason">
          <span class="rr-label" style="color:var(--green)">Approuvé le</span>
          <span class="rr-text" style="font-style:normal">${reviewedAt}</span>
        </div>
      `;
    }

    return `
      <div class="app-card" id="card-${uid}">
        <div class="app-card-header">
          <div class="app-card-title">
            <span class="org-name">${escHtml(app.org_name || '—')}</span>
            <span class="org-type-badge">${orgType.icon} ${orgType.label}</span>
            <span class="status-badge ${currentTab}">${statusLabel[currentTab]}</span>
          </div>
          <span class="app-date">Candidature du ${createdAt}</span>
        </div>
        <div class="app-card-body">
          <div class="info-item">
            <span class="info-label">Contact</span>
            <span class="info-value">${escHtml(profile.full_name || '—')}</span>
          </div>
          <div class="info-item">
            <span class="info-label">Email</span>
            <span class="info-value">${typeof email === 'string' ? escHtml(email) : email}</span>
          </div>
          <div class="info-item">
            <span class="info-label">Téléphone</span>
            <span class="info-value">${escHtml(app.phone || '—')}</span>
          </div>
          <div class="info-item">
            <span class="info-label">Ville</span>
            <span class="info-value">${escHtml(app.city || '—')}</span>
          </div>
          <div class="info-item">
            <span class="info-label">Site web</span>
            <span class="info-value">${websiteHtml}</span>
          </div>
          <div class="info-item">
            <span class="info-label">SIRET</span>
            <span class="info-value">${escHtml(app.siret || '—')}</span>
          </div>
          <div class="info-item">
            <span class="info-label">Événements prévus</span>
            <span class="info-value">${eventsCount}</span>
          </div>
          <div class="info-item">
            <span class="info-label">Type de compte</span>
            <span class="info-value">${escHtml(profile.account_type || '—')}</span>
          </div>
          ${app.description ? `
          <div class="info-item full">
            <span class="info-label">Description</span>
            <div class="description-text">${escHtml(app.description)}</div>
          </div>` : ''}
        </div>
        ${actionsHtml}
      </div>
    `;
  }

  // ── Approve ──────────────────────────────────────────────────────────────────
  async function approveApp(uid, btnApprove, btnReject) {
    btnApprove.disabled = true;
    btnReject.disabled = true;
    btnApprove.textContent = '…';

    const { error: e1 } = await sb.from('organizers')
      .update({ status: 'approved', verified: true, reviewed_at: new Date().toISOString() })
      .eq('user_id', uid);

    if (e1) {
      showToast('Erreur : ' + e1.message, 'error');
      btnApprove.disabled = false;
      btnReject.disabled = false;
      btnApprove.innerHTML = '✓ Approuver';
      return;
    }

    const { error: e2 } = await sb.from('profiles')
      .update({ is_organizer: true })
      .eq('id', uid);

    if (e2) {
      showToast('Organisateur approuvé (profil non mis à jour : ' + e2.message + ')', 'error');
    } else {
      showToast('Candidature approuvée avec succès !', 'success');
    }

    await loadCounts();
    await loadApplications();
  }

  // ── Reject ───────────────────────────────────────────────────────────────────
  async function rejectApp(uid, reason, btnConfirm) {
    btnConfirm.disabled = true;
    btnConfirm.textContent = '…';

    const payload = {
      status: 'rejected',
      reviewed_at: new Date().toISOString(),
    };
    if (reason) payload.rejection_reason = reason;

    const { error } = await sb.from('organizers')
      .update(payload)
      .eq('user_id', uid);

    if (error) {
      showToast('Erreur : ' + error.message, 'error');
      btnConfirm.disabled = false;
      btnConfirm.textContent = 'Confirmer le rejet';
      return;
    }

    showToast('Candidature rejetée.', 'success');
    await loadCounts();
    await loadApplications();
  }

  // ── Tabs ─────────────────────────────────────────────────────────────────────
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTab = btn.dataset.tab;
      await loadApplications();
    });
  });

  // ── Logout ───────────────────────────────────────────────────────────────────
  document.getElementById('btn-logout').addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.replace('index.html');
  });

  // ── Helpers ──────────────────────────────────────────────────────────────────
  function escHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Boot ─────────────────────────────────────────────────────────────────────
  initAuth();
</script>
</body>
</html>
